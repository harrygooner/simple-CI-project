global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "python-app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "simple-ci-control-plane:30080"
        labels:
          service: "python-app"
          environment: "production"

  - job_name: "jenkins"
    metrics_path: /prometheus
    static_configs:
      - targets:
          - "jenkins-controller:8080"
    basic_auth:
      username: "admin"
      password_file: /etc/prometheus/secrets/jenkins_api_token.txt
