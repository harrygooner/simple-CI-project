services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-controller
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - cicd

  docker-agent:
    image: ci-app-docker-agent:latest
    build:
      context: ./jenkins/agent
      dockerfile: Dockerfile
    container_name: jenkins-docker-agent
    user: root
    restart: unless-stopped
    depends_on:
      - jenkins
    environment:
      - JENKINS_URL=http://jenkins:8080/
      - DOCKER_HOST=unix:///var/run/docker.sock
    command:
      [
        "-url",
        "http://jenkins:8080/",
        "${JENKINS_AGENT_SECRET:?Please set JENKINS_AGENT_SECRET in .env}",
        "docker-agent"
      ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cicd
      - kind

volumes:
  jenkins_home:

networks:
  cicd:
    name: cicd-network
  kind:
    external: true